<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTR Review Tracker (Simple Test)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>PTR Review Tracker (Simple Test)</h1>
        <p>Just the count of R4R / Pending Review mentions for each project.</p>
      </header>

      <section class="toolbar" aria-label="Controls">
        <button id="refreshButton" type="button">Refresh</button>
        <p id="lastUpdated" aria-live="polite"></p>
      </section>

      <section>
        <h2>Project counts</h2>
        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>R4R/Pending mentions</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </section>

      <section class="notes">
        <p id="statusText" aria-live="polite"></p>
      </section>
    </main>

    <script src="app.js?v=20260305"></script>
  </body>
</html>
